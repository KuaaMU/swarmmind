<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="hex-grad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="60" cy="60" r="55" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="120" height="120" rx="24" fill="url(#bg-glow)"/>
  <!-- Outer hexagon -->
  <path d="M60 12L103 33.5v43L60 108 17 76.5v-43L60 12z" stroke="url(#hex-grad)" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Inner mesh -->
  <line x1="60" y1="12" x2="60" y2="108" stroke="url(#hex-grad)" stroke-width="0.6" opacity="0.15"/>
  <line x1="17" y1="33.5" x2="103" y2="76.5" stroke="url(#hex-grad)" stroke-width="0.6" opacity="0.15"/>
  <line x1="103" y1="33.5" x2="17" y2="76.5" stroke="url(#hex-grad)" stroke-width="0.6" opacity="0.15"/>
  <!-- Agent nodes -->
  <!-- Scout (top) - blue -->
  <circle cx="60" cy="36" r="10" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="60" cy="36" r="4" fill="#3b82f6" fill-opacity="0.6"/>
  <!-- Oracle (right) - yellow -->
  <circle cx="86" cy="62" r="10" fill="#eab308" fill-opacity="0.15" stroke="#eab308" stroke-width="1.5"/>
  <circle cx="86" cy="62" r="4" fill="#eab308" fill-opacity="0.6"/>
  <!-- Executor (bottom) - green -->
  <circle cx="60" cy="88" r="10" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="60" cy="88" r="4" fill="#22c55e" fill-opacity="0.6"/>
  <!-- Manager (left) - purple -->
  <circle cx="34" cy="62" r="10" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-width="1.5"/>
  <circle cx="34" cy="62" r="4" fill="#a855f7" fill-opacity="0.6"/>
  <!-- Connection lines -->
  <line x1="60" y1="36" x2="86" y2="62" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="36" x2="34" y2="62" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
  <line x1="86" y1="62" x2="60" y2="88" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
  <line x1="34" y1="62" x2="60" y2="88" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
  <line x1="34" y1="62" x2="86" y2="62" stroke="#3b82f6" stroke-width="0.8" opacity="0.2"/>
  <line x1="60" y1="36" x2="60" y2="88" stroke="#22c55e" stroke-width="0.8" opacity="0.2"/>
</svg>
